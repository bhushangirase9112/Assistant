<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Akshada Chatbot</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .chat-container {
        width: 400px;
        height: 600px;
        background: white;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        overflow: hidden;
    }

    .chat-header {
        background: #4f46e5;
        color: white;
        padding: 15px;
        font-weight: bold;
        text-align: center;
    }

    .chat-messages {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
    }

    .message {
        margin: 8px 0;
        padding: 8px 12px;
        border-radius: 8px;
        max-width: 75%;
    }

    .user {
        background: #4f46e5;
        color: white;
        margin-left: auto;
    }

    .bot {
        background: #e5e7eb;
        color: black;
    }

    .chat-input {
        display: flex;
        border-top: 1px solid #ddd;
    }

    .chat-input input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
    }

    .chat-input button {
        padding: 10px 15px;
        border: none;
        background: #4f46e5;
        color: white;
        cursor: pointer;
    }

    .chat-input button:hover {
        background: #4338ca;
    }
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">Akshada 🤖</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

const API_KEY = "AIzaSyDJ4uF2FWXGI3a_fWVH9eZlBw8Pl1obqT4"; 
const MODEL = "gemini-2.5-flash-lite";

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("userInput");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// 👇 Initial Introduction Message
window.onload = function() {
    addMessage("Hi, I'm Akshada 😊 How can I help you?", "bot");
};

function addMessage(text, className) {
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.innerText = text;
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const userText = input.value.trim();
    if (!userText) return;

    addMessage(userText, "user");
    input.value = "";

    addMessage("Typing...", "bot");

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [
                        {
                            parts: [
                                { 
                                  text: "You are Akshada, a helpful, friendly AI assistant. Always respond as Akshada.\nUser: " + userText 
                                }
                            ]
                        }
                    ]
                })
            }
        );

        const data = await response.json();

        messagesDiv.removeChild(messagesDiv.lastChild);

        const botReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't respond.";
        addMessage(botReply, "bot");

    } catch (error) {
        messagesDiv.removeChild(messagesDiv.lastChild);
        addMessage("Error connecting to Gemini API.", "bot");
        console.error(error);
    }
}

</script>

</body>
</html>
